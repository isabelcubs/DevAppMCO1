<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animo Skies | My Reservation</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="reservation.css">

</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-plane-departure me-2"></i>Animo Skies
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Search Flights</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Book Flight</a></li>
                    <li class="nav-item"><a class="nav-link active" href="reservation.html">My Reservation</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">User Profile</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-4">
        <div class="row">
            <div class="col-12">
                <div class="reservation-card p-4">

                    <!-- Page Title -->
                    <div class="section-title">My Reservations</div>

                    <!-- Search and Filter Controls -->
                    <div class="res-controls">
                        <div class="search-sort">
                            <input type="text" class="form-control" id="searchInput" placeholder="Search by name/reference number">
                            <select class="form-select" id="filterStatus">
                                <option value="all">All Status</option>
                                <option value="Confirmed">Confirmed</option>
                                <option value="Pending">Pending</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                            <select class="form-select" id="sortBy">
                                <option value="name">Sort by name</option>
                                <option value="date">Sort by date</option>
                            </select>
                        </div>
                    </div>

                    <!-- Reservations List -->
                    <div id="reservationsList"></div>

                    <!-- Pagination -->
                    <div id="paginationControls" class="pagination-controls"></div>

                    <!-- Go Back Button -->
                    <div class="text-center mt-4">
                        <button class="btn-back" id="goBackBtn"><i class="fas fa-arrow-left me-2"></i>Go Back</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- View Details Modal -->
    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header modal-header-primary">
                    <h5 class="modal-title"><i class="fas fa-ticket-alt me-2"></i>Booking Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailsContent">
                    <!-- Dynamic content -->
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-primary btn-primary-custom" id="editFromModal">
                        <i class="fas fa-edit me-1"></i>Edit Reservation
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Booking Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header modal-header-primary">
                    <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Edit Booking</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="editContent">
                    <!-- Dynamic form content -->
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary btn-primary-custom" id="saveEditBtn">
                        <i class="fas fa-save me-1"></i>Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cancel Confirmation Modal -->
    <div class="modal fade" id="cancelModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header modal-header-danger">
                    <h5 class="modal-title"><i class="fas fa-exclamation-triangle me-2"></i>Cancel Reservation</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to cancel this booking?</p>
                    <p><strong>Reference:</strong> <span id="modalBookingRef"></span></p>
                    <p><strong>Passenger:</strong> <span id="modalBookingPassenger"></span></p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">No, keep</button>
                    <button class="btn btn-danger" id="modalConfirmCancel">Yes, Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toastMsg" class="toast-message">
        <i class="fas fa-check-circle me-2"></i> <span id="toastText"></span>
    </div>

    <!-- Footer -->
    <footer>
        <p><i class="fas fa-plane me-2"></i>Animo Skies</p>
        <small>© 2026 Animo Skies | All rights reserved</small>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="reservation.js"></script>

</body>

</html>
